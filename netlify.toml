[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  PLAYWRIGHT_BROWSERS_PATH = "node_modules/.cache/ms-playwright"
  # Optional: override deploy URL for canonicals / JSON-LD (must include https:// if you set it).
  # If unset, the build uses Netlify’s URL / DEPLOY_PRIME_URL automatically via vite.config.ts.
  # VITE_SITE_URL = "https://your-custom-domain.com"

# Static prerendered files (e.g. /example/index.html) shadow this rewrite when present.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
